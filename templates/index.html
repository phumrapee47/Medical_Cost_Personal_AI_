{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="glass-card p-8 bg-gradient-to-r from-blue-900/40 to-cyan-900/40">
        <div class="flex justify-between items-center flex-wrap gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2">Advanced Visualizations</h1>
                <p class="text-slate-300">Interactive charts analyzing patient demographics & medical charges.</p>
            </div>
            <a href="/export" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition flex items-center gap-2 shadow-lg hover:shadow-blue-500/20">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Export Dataset
            </a>
        </div>
    </div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <!-- Main Scatter Chart -->
        <div class="glass-card p-6 lg:col-span-2">
            <h2 class="text-xl font-semibold text-white mb-4">Age vs. Charges (By Smoking Status)</h2>
            <div id="scatterChart" class="w-full" style="height: 450px;"></div>
        </div>

        <!-- Box Plot: Charges by Region -->
        <div class="glass-card p-6">
            <h2 class="text-xl font-semibold text-white mb-4">Charges Distribution by Region</h2>
            <div id="regionBoxChart" class="w-full" style="height: 350px;"></div>
        </div>

        <!-- Pie Chart / Box Plot -->
        <div class="glass-card p-6">
            <h2 class="text-xl font-semibold text-white mb-4">Charges Impact: Smoker vs Non-Smoker</h2>
            <div id="smokerBoxChart" class="w-full" style="height: 350px;"></div>
        </div>

    </div>
</div>

<script>
    const allData = {{ chart_data | safe }};
    
    if (allData && allData.length > 0) {
        // Layout Template for Dark Mode
        const darkLayout = {
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#f8fafc', family: "'Outfit', sans-serif" },
            margin: { t: 20, l: 60, r: 20, b: 40 },
            xaxis: { gridcolor: '#1e293b', zerolinecolor: '#334155' },
            yaxis: { gridcolor: '#1e293b', zerolinecolor: '#334155' }
        };

        // 1. Scatter Chart: Age vs Charges (Split by Smoker)
        const smokers = allData.filter(d => d.smoker === 'yes');
        const nonSmokers = allData.filter(d => d.smoker === 'no');

        const scatterTrace1 = {
            x: smokers.map(d => d.age), y: smokers.map(d => d.charges),
            mode: 'markers', type: 'scatter', name: 'Smoker',
            marker: { size: 8, color: '#ef4444', opacity: 0.7 }
        };
        const scatterTrace2 = {
            x: nonSmokers.map(d => d.age), y: nonSmokers.map(d => d.charges),
            mode: 'markers', type: 'scatter', name: 'Non-Smoker',
            marker: { size: 8, color: '#3b82f6', opacity: 0.7 }
        };
        
        let scatterLayout = JSON.parse(JSON.stringify(darkLayout));
        scatterLayout.xaxis.title = 'Age';
        scatterLayout.yaxis.title = 'Medical Charges ($)';
        Plotly.newPlot('scatterChart', [scatterTrace1, scatterTrace2], scatterLayout, {responsive: true});


        // 2. Box Plot: Charges by Region
        const regions = [...new Set(allData.map(d => d.region))];
        const regionData = regions.map(region => ({
            y: allData.filter(d => d.region === region).map(d => d.charges),
            type: 'box',
            name: region.charAt(0).toUpperCase() + region.slice(1),
            marker: { color: '#8b5cf6' }
        }));
        
        let regionLayout = JSON.parse(JSON.stringify(darkLayout));
        regionLayout.yaxis.title = 'Charges ($)';
        Plotly.newPlot('regionBoxChart', regionData, regionLayout, {responsive: true});


        // 3. Box Plot: Smoker vs Non-Smoker
        const smokerData = [
            {
                y: smokers.map(d => d.charges),
                type: 'box', name: 'Smoker', marker: { color: '#ef4444' }
            },
            {
                y: nonSmokers.map(d => d.charges),
                type: 'box', name: 'Non-Smoker', marker: { color: '#10b981' }
            }
        ];
        
        let smokerBoxLayout = JSON.parse(JSON.stringify(darkLayout));
        smokerBoxLayout.yaxis.title = 'Charges ($)';
        Plotly.newPlot('smokerBoxChart', smokerData, smokerBoxLayout, {responsive: true});

    } else {
        document.getElementById('scatterChart').innerHTML = '<div class="flex h-full items-center justify-center text-slate-500">No data available</div>';
    }
</script>
{% endblock %}
