{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="glass-card p-8 bg-gradient-to-r from-blue-900/40 to-indigo-900/40">
        <h1 class="text-3xl font-bold text-white mb-2">Insurance Data Dashboard</h1>
        <p class="text-slate-300">Overview of medical charges based on patient demographics.</p>
    </div>

    <!-- Chart -->
    <div class="glass-card p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-white">Age vs. Charges Analysis</h2>
            <a href="/export" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Export CSV
            </a>
        </div>
        <div id="insuranceChart" class="w-full" style="height: 400px;"></div>
    </div>
</div>

<script>
    // Passing data from Flask
    const chartData = {{ chart_data | safe }};
    
    if (chartData && chartData.labels && chartData.labels.length > 0) {
        const trace = {
            x: chartData.labels,
            y: chartData.values,
            mode: 'markers',
            type: 'scatter',
            name: 'Patients',
            marker: { 
                size: 8, 
                color: chartData.values,
                colorscale: 'Viridis',
                showscale: true
            }
        };

        const layout = {
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#f8fafc' },
            xaxis: { title: 'Age', gridcolor: '#1e293b' },
            yaxis: { title: 'Medical Charges ($)', gridcolor: '#1e293b' },
            margin: { t: 20, l: 60, r: 20, b: 40 }
        };

        Plotly.newPlot('insuranceChart', [trace], layout, {responsive: true});
    } else {
        document.getElementById('insuranceChart').innerHTML = '<div class="flex h-full items-center justify-center text-slate-500">No data available from Supabase (or Database Empty)</div>';
    }
</script>
{% endblock %}
